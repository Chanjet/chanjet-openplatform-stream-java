spring:
  application:
    name: open-streaming-gateway
  threads:
    virtual:
      enabled: true # 全局开启 Java 21 虚拟线程支持
  profiles:
    active: localhost # 默认激活本地环境

connector:
  internal-token: ${GATEWAY_INTERNAL_TOKEN:cjt-default-token} # 内部 P2P 通讯令牌

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,env
  endpoint:
    health:
      show-details: always

server:
  port: 8080
  tomcat:
    threads:
      max: 200 # 开启虚拟线程后，平台线程仅需少量
