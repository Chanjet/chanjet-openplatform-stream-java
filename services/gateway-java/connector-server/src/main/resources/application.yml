spring:
  application:
    name: open-streaming-gateway
  threads:
    virtual:
      enabled: true # 全局开启 Java 21 虚拟线程支持
  profiles:
    active: localhost # 默认激活本地环境
  config:
    import:
      - optional:classpath:application-local-private.yml # 引入本地私密配置 (Git 忽略)

connector:
  internal-token: ${GATEWAY_INTERNAL_TOKEN:cjt-default-token} # 内部 P2P 通讯令牌

management:
  server:
    port: 8081 # 独立管理端口，实现管理流与业务流隔离
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,env
  endpoint:
    health:
      show-details: always

server:
  port: 8080
  tomcat:
    threads:
      max: 200 # 开启虚拟线程后，平台线程仅需少量
