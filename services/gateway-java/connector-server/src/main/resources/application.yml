spring:
  application:
    cid: C4048
    name: open-streaming-gateway
  threads:
    virtual:
      enabled: true # 全局开启 Java 21 虚拟线程支持


connector:
  internal-tokens: 
    - cjt-default-internal-token

management:
  server:
    port: 8081 # 独立管理端口，实现管理流与业务流隔离
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,env
  endpoint:
    health:
      show-details: always

server:
  port: 8080
  tomcat:
    threads:
      max: 200 # 开启虚拟线程后，平台线程仅需少量
