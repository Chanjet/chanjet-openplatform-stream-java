spring:
  application:
    name: open-streaming-gateway
  threads:
    virtual:
      enabled: true # 开启 Java 21 虚拟线程支持

connector:
  node-id: ${spring.cloud.client.ip-address:127.0.0.1}:${server.port:8080}

services:
  auth:
    id: cjt-auth-service
  subscription:
    id: cjt-subscription-manager

server:
  port: 8080
  tomcat:
    threads:
      max: 200 # 在开启虚拟线程后，此限制主要影响平台线程
