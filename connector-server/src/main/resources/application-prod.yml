# 生产环境 (Production)
connector:
  node-id: ${spring.cloud.client.ip-address}:${server.port}

services:
  auth:
    id: authorization-service
  subscription:
    id: developer
spring:
  cloud:
    nacos:
      discovery:
        server-addr: nacos-prod.chanjet.com:8848
        namespace: prod-namespace-uuid

logging:
  level:
    com.chanjet.connector: INFO # 生产环境仅保留 INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n" # 结构化日志
