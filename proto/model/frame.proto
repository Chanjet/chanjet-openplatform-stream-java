syntax = "proto3";

package com.chanjet.connector.proto.model;

option java_package = "com.chanjet.connector.proto.model";
option java_multiple_files = true;
option go_package = "github.com/chanjet/open-streaming-connector/proto/model";

// 核心数据推送帧 (Gateway -> Client)
message EventFrame {
  string msg_id = 1;               // 网关生成的唯一 ID (UUID)
  string trace_id = 2;             // 全链路追踪 ID
  string app_key = 3;              // ISV 应用标识
  map<string, string> headers = 4; // 业务 Headers 透传白名单
  string payload = 5;              // 原始业务数据 (Raw Body String)
  int64 timestamp = 6;             // 毫秒级时间戳
}

// 业务处理响应帧 (Client -> Gateway)
message AckFrame {
  string msg_id = 1;               // 引用推送帧的 msg_id
  int32 code = 2;                  // 业务处理状态码 (200=成功)
  string message = 3;              // 辅助说明信息
  int64 timestamp = 4;             // 毫秒级时间戳
}
