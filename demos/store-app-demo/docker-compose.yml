version: '3.8'

services:
  # The ISV Main Application
  app:
    build: .
    environment:
      - COWEN_APP_KEY=${COWEN_APP_KEY:-<APP_KEY>}
      - REDIRECT_URI=http://localhost:5000/callback
      - COWEN_OPENAPI_URL=${COWEN_OPENAPI_URL:-https://openapi.chanjet.com}
      - COWEN_MARKET_URL=${COWEN_MARKET_URL:-https://market.chanjet.com}
      - COWEN_PROXY_URL=http://127.0.0.1:8080 # Same network namespace as cowen
    depends_on:
      - cowen
    network_mode: "service:cowen" # [CRITICAL] Share network namespace with cowen sidecar

  # Cowen Sidecar
  cowen:
    image: chanjet/cowen:latest
    ports:
      - "5000:5000" # Expose app port
      - "8080:8080" # Expose proxy to host for debugging if needed
    environment:
      - COWEN_APP_MODE=store_app
      - COWEN_APP_KEY=${COWEN_APP_KEY:-<APP_KEY>}
      - COWEN_APP_SECRET=${COWEN_APP_SECRET:-<APP_SECRET>}
      - COWEN_ENCRYPT_KEY=${COWEN_ENCRYPT_KEY:-<ENCRYPT_KEY>}
      - COWEN_WEBHOOK_TARGET=http://127.0.0.1:5000/webhook
      - COWEN_PROXY_PORT=8080
      - COWEN_STORE_TYPE=redis
      - COWEN_DB_URL=redis://redis:6379/0
      # Optional: Override URLs for Sandbox environment
      - COWEN_OPENAPI_URL=${COWEN_OPENAPI_URL:-https://open.chanjet.com}
      - COWEN_STREAM_URL=${COWEN_STREAM_URL:-wss://streaming.chanjet.com}
    depends_on:
      - redis

  # Redis for Distributed Token Storage
  redis:
    image: redis:alpine
    command: redis-server --appendonly yes
