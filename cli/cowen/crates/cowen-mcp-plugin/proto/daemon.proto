syntax = "proto3";
package cowen.daemon.v1;

// The principal daemon orchestration service (The Controller Interface)
service CowenDaemonService {
    rpc Ping (PingRequest) returns (PingResponse);
    rpc StartWorker (StartWorkerRequest) returns (StartWorkerResponse);
    rpc StartAllWorkers (StartAllWorkersRequest) returns (StartAllWorkersResponse);
    rpc StopWorker (StopWorkerRequest) returns (StopWorkerResponse);
    rpc StopAllWorkers (StopAllWorkersRequest) returns (StopAllWorkersResponse);
    rpc ReloadWorker (ReloadWorkerRequest) returns (ReloadWorkerResponse);
    rpc GetStatus (GetStatusRequest) returns (GetStatusResponse);
    rpc InitProfile (InitProfileRequest) returns (InitProfileResponse);
    rpc CallApi (CallApiRequest) returns (CallApiResponse);
    rpc GetAuthUrl (GetAuthUrlRequest) returns (GetAuthUrlResponse);
    rpc WaitForAuth (WaitForAuthRequest) returns (WaitForAuthResponse);
    rpc GetToken (GetTokenRequest) returns (GetTokenResponse);
    rpc ClearToken (ClearTokenRequest) returns (ClearTokenResponse);
    rpc Doctor (DoctorRequest) returns (DoctorResponse);
    rpc GetGlobalConfig (GetGlobalConfigRequest) returns (GetGlobalConfigResponse);
    rpc SetGlobalConfig (SetGlobalConfigRequest) returns (SetGlobalConfigResponse);
    rpc GetConfig (GetConfigRequest) returns (GetConfigResponse);
    rpc ListConfig (ListConfigRequest) returns (ListConfigResponse);
    rpc SetConfig (SetConfigRequest) returns (SetConfigResponse);
    rpc StoreStatus (StoreStatusRequest) returns (StoreStatusResponse);
    rpc SystemStatus (SystemStatusRequest) returns (SystemStatusResponse);
    rpc SystemReset (SystemResetRequest) returns (SystemResetResponse);
    rpc RenameProfile (RenameProfileRequest) returns (RenameProfileResponse);
    rpc DlqList (DlqListRequest) returns (DlqListResponse);
    rpc DlqView (DlqViewRequest) returns (DlqViewResponse);
    rpc DlqRetry (DlqRetryRequest) returns (DlqRetryResponse);
    rpc DlqPurge (DlqPurgeRequest) returns (DlqPurgeResponse);
    rpc TailAudit (TailAuditRequest) returns (TailAuditResponse);
    rpc ApiList (ApiListRequest) returns (ApiListResponse);
    rpc ApiSpec (ApiSpecRequest) returns (ApiSpecResponse);
}

enum WorkerState {
    WORKER_STATE_UNSPECIFIED = 0;
    WORKER_STATE_CREATED = 1;
    WORKER_STATE_STARTING = 2;
    WORKER_STATE_RUNNING = 3;
    WORKER_STATE_BACKOFF = 4;
    WORKER_STATE_FAILED = 5;
    WORKER_STATE_DRAINING = 6;
    WORKER_STATE_STOPPED = 7;
}

message WorkerBackoffDetails {
    uint32 retry_count = 1;
    string last_error = 2;
    uint64 next_retry_in_secs = 3;
}

message WorkerStateInfo {
    WorkerState state = 1;
    WorkerBackoffDetails backoff = 2;
    string failure_reason = 3;
}

message PingRequest {}
message PingResponse {
    string message = 1; // "pong"
}

message StartWorkerRequest {
    string profile = 1;
    string config_json = 2; 
}
message StartWorkerResponse {
    bool success = 1;
    string message = 2;
}

message StartAllWorkersRequest {}
message StartAllWorkersResponse {
    bool success = 1;
    string message = 2;
}

message StopWorkerRequest {
    string profile = 1;
}
message StopWorkerResponse {
    bool success = 1;
    string message = 2;
}

message StopAllWorkersRequest {}
message StopAllWorkersResponse {
    bool success = 1;
    string message = 2;
}

message ReloadWorkerRequest {
    string profile = 1;
}
message ReloadWorkerResponse {
    bool success = 1;
    string message = 2;
}

message GetStatusRequest {
    optional string profile = 1;
}
message GetStatusResponse {
    map<string, WorkerStateInfo> statuses = 1;
}

message InitProfileRequest {
    string profile = 1;
    optional string app_key = 2;
    optional string app_secret = 3;
    optional string certificate = 4;
    optional string encrypt_key = 5;
    optional string webhook_target = 6;
    optional string openapi_url = 7;
    optional string stream_url = 8;
    optional string app_mode = 9;
    optional uint32 proxy_port = 10;
}
message InitProfileResponse {
    bool success = 1;
    string message = 2;
}

message CallApiRequest {
    string profile = 1;
    string method = 2;
    string path = 3;
    optional string data = 4;
    bool force = 5;
}
message CallApiResponse {
    uint32 status = 1;
    map<string, string> headers = 2;
    string body = 3;
    optional string error_message = 4;
}

message GetAuthUrlRequest {
    string profile = 1;
    bool force = 2;
}
message GetAuthUrlResponse {
    bool success = 1;
    string url = 2;
    string state = 3;
    optional string error_message = 4;
}

message WaitForAuthRequest {
    string profile = 1;
    string state = 2;
}
message WaitForAuthResponse {
    bool success = 1;
    string token = 2;
    optional string error_message = 3;
}

message GetTokenRequest {
    string profile = 1;
    bool refresh = 2;
}
message GetTokenResponse {
    string token_json = 1;
    optional string error_message = 2;
}

message ClearTokenRequest {
    string profile = 1;
}
message ClearTokenResponse {
    bool success = 1;
    string message = 2;
}

message DoctorRequest {
    string profile = 1;
}
message DoctorResponse {
    string report = 1;
    optional string error_message = 2;
}

message GetGlobalConfigRequest {}
message GetGlobalConfigResponse {
    string config_json = 1;
    optional string error_message = 2;
}

message SetGlobalConfigRequest {
    string key = 1;
    string value = 2;
}
message SetGlobalConfigResponse {
    bool success = 1;
    optional string error_message = 2;
}

message GetConfigRequest {
    string profile = 1;
    string key = 2;
}
message GetConfigResponse {
    string config_json = 1;
    optional string error_message = 2;
}

message ListConfigRequest {
    string profile = 1;
    string format = 2;
    bool all = 3;
}
message ListConfigResponse {
    string config_json = 1;
    optional string error_message = 2;
}

message SetConfigRequest {
    string profile = 1;
    string key = 2;
    string value = 3;
}
message SetConfigResponse {
    bool success = 1;
    optional string error_message = 2;
}

message StoreStatusRequest {}
message StoreStatusResponse {
    string json = 1;
    optional string error_message = 2;
}

message SystemStatusRequest {
    string profile = 1;
    bool all = 2;
}
message SystemStatusResponse {
    string json = 1;
    optional string error_message = 2;
}

message SystemResetRequest {
    optional string profile = 1;
    bool dry_run = 2;
}
message SystemResetResponse {
    bool success = 1;
    string message = 2;
}

message RenameProfileRequest {
    string old_name = 1;
    string new_name = 2;
}
message RenameProfileResponse {
    bool success = 1;
    string message = 2;
}

message DlqListRequest {
    string profile = 1;
    uint32 page = 2;
    uint32 page_size = 3;
}
message DlqListResponse {
    string json = 1;
    optional string error_message = 2;
}

message DlqViewRequest {
    string profile = 1;
    string id = 2;
}
message DlqViewResponse {
    string json = 1;
    optional string error_message = 2;
}

message DlqRetryRequest {
    string profile = 1;
    string id = 2;
}
message DlqRetryResponse {
    bool success = 1;
    string message = 2;
    optional string error_message = 3;
}

message DlqPurgeRequest {
    string profile = 1;
}
message DlqPurgeResponse {
    bool success = 1;
    string message = 2;
    optional string error_message = 3;
}

message TailAuditRequest {
    string profile = 1;
    uint32 lines = 2;
}
message TailAuditResponse {
    string content = 1;
    optional string error_message = 2;
}

message ApiListRequest {
    string profile = 1;
    optional string search = 2;
    uint32 page = 3;
    uint32 page_size = 4;
    bool refresh = 5;
}
message ApiListResponse {
    uint32 total = 1;
    string json = 2;
    optional string plugin_used = 3;
    optional string error_message = 4;
}

message ApiSpecRequest {
    string profile = 1;
    string method = 2;
    string path = 3;
}
message ApiSpecResponse {
    string json = 1;
    optional string error_message = 2;
}
