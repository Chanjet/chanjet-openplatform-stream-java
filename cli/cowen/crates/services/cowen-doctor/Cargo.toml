[package]
publish = false
name = "cowen-doctor"
version = "0.5.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
async-trait = "0.1"
cowen-common = { path = "../../core/cowen-common" }
cowen-config = { path = "../../services/cowen-config" }
inventory = "0.3"
reqwest = { version = "0.13", default-features = false, features = ["json", "rustls", "form", "query"] }
tokio = { version = "1.0", features = ["rt", "macros"] }
tracing = "0.1"
