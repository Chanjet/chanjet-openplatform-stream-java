<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>授权失败 | Cowen CLI</title>
    <style>
        body { background: #0F172A; color: #F8FAFC; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .container { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(225, 29, 72, 0.2); padding: 3rem; border-radius: 1.5rem; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); max-width: 450px; width: 90%; }
        .icon-wrapper { width: 80px; height: 80px; background: rgba(225, 29, 72, 0.1); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 1.5rem; color: #E11D48; animation: shake 0.4s 0.2s cubic-bezier(.36,.07,.19,.97) both; }
        h1 { font-size: 1.75rem; font-weight: 700; margin: 0 0 1rem; letter-spacing: -0.025em; color: #FDA4AF; }
        p { color: #94A3B8; line-height: 1.6; margin: 0 0 2rem; }
        .error-details { background: rgba(0, 0, 0, 0.2); padding: 1rem; border-radius: 0.75rem; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 0.8125rem; text-align: left; margin-bottom: 2rem; border-left: 4px solid #E11D48; }
        .error-code { color: #F43F5E; font-weight: 600; margin-bottom: 0.25rem; }
        .error-desc { color: #CBD5E1; }
        .back-msg { background: rgba(255, 255, 255, 0.05); padding: 0.75rem 1rem; border-radius: 0.75rem; font-size: 0.875rem; color: #64748B; border: 1px dashed rgba(255, 255, 255, 0.1); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
        </div>
        <h1>授权未完成</h1>
        <p>抱歉，我们在建立安全连接时遇到了问题。请查看下方的详细信息：</p>
        <div class="error-details">
            <div class="error-code">错误代码: {{ERROR}}</div>
            <div class="error-desc">{{DESCRIPTION}}</div>
        </div>
        <div class="back-msg">💡 您可以关闭此页面返回终端，尝试重新运行 <b>cowen init</b> 授权。</div>
    </div>
</body>
</html>
