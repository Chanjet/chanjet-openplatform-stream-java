[package]
publish = false
name = "cowen-store"
version = "0.5.0"
edition = "2021"

[package.metadata.cargo-machete]
ignored = ["tiberius", "tokio-util"]

[features]
default = ["sqlite"]
sqlite = ["sqlx/sqlite"]
postgres = ["sqlx/postgres"]
mysql = ["sqlx/mysql"]
mssql = ["dep:tiberius", "dep:deadpool-tiberius", "dep:tokio-util"]
redis = ["dep:redis"]
all-stores = ["sqlite", "postgres", "mysql", "mssql", "redis"]

[dependencies]
anyhow = "1.0"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.6", features = ["derive"] }
connector-sdk = { version = "0.1.0", path = "../../../../../sdk/rust" }
cowen-common = { path = "../../core/cowen-common", features = ["sqlx", "redis"] }
cowen-config = { path = "../../services/cowen-config" }
cowen-doctor = { path = "../../services/cowen-doctor" }
cowen-sys = { path = "../../core/cowen-sys" }
deadpool-tiberius = { version = "0.1.9", optional = true }
fs2 = "0.4"
inventory = "0.3"
redis = { version = "0.27", features = ["tokio-comp", "aio"], optional = true }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlx = { version = "0.8", features = ["runtime-tokio", "tls-rustls", "chrono", "json"], optional = true }
tiberius = { version = "0.12", features = ["chrono", "tds73"], optional = true }
tokio = { version = "1.0", features = ["full"] }
tokio-util = { version = "0.7", features = ["compat"], optional = true }
tracing = "0.1"
url = "2.5.8"
uuid = { version = "1.12", features = ["v4"] }

[dev-dependencies]
tempfile = "3.8"
