[package]
publish = false
name = "cowen-monitor"
version = "0.4.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
async-trait = "0.1"
axum = { version = "0.8.8", features = ["json", "tokio"] }
chrono = { version = "0.4", features = ["serde", "clock"] }
cowen-common = { path = "../../core/cowen-common", features = ["reqwest"] }
cowen-infra = { path = "../../core/cowen-infra" }
log = "0.4"
logroller = "0.1"
prometheus = "0.14"
rand = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
socket2 = "0.5.5"
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio-rustls", "chrono"] }
tokio = { version = "1.0", features = ["sync", "rt", "time", "net", "macros"] }
tracing = "0.1"
tracing-appender = "0.2"
tracing-subscriber = { version = "0.3.18", features = ["env-filter", "json", "registry", "time"] }
uuid = { version = "1.0", features = ["v4"] }

[dev-dependencies]
tempfile = "3.3"
