[package]
name = "cowen-config"
version = "0.3.1"
edition = "2021"

[dependencies]
tokio = { version = "1.40", features = ["full"] }
notify = "6.1"
serde = { version = "1.0", features = ["derive"] }
serde_yaml = { package = "serde_yaml_ng", version = "0.10" }
tracing = "0.1"
anyhow = "1.0"
thiserror = "2.0"

[dev-dependencies]
tempfile = "3.10"
libc = "0.2"
