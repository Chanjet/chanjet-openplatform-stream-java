[package]
publish = false
name = "cowen-ai"
version = "0.5.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
ort = { version = "2.0.0-rc.12", features = ["ndarray"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokenizers = { version = "0.22", default-features = false, features = ["onig"] }
[build-dependencies]
sha2 = "0.10"

[dev-dependencies]
sha2 = "0.10"

