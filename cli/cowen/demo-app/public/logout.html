<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安全登出 - Cowen 零信任安全网关</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: rgba(17, 24, 39, 0.75);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-color: #f3f4f6;
      --text-muted: #9ca3af;
      --success: #10b981;
      --success-glow: rgba(16, 185, 129, 0.15);
      --primary: #3b82f6;
      --primary-glow: rgba(59, 130, 246, 0.2);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      background-image: 
        radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.08) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.08) 0px, transparent 50%);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 28px;
      padding: 50px 40px;
      max-width: 550px;
      width: 90%;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5);
      text-align: center;
      position: relative;
    }
    .success-icon {
      width: 72px;
      height: 72px;
      background: rgba(16, 185, 129, 0.1);
      border: 2px solid rgba(16, 185, 129, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 25px auto;
      color: var(--success);
      font-size: 2.2rem;
      box-shadow: 0 0 25px var(--success-glow);
      animation: scaleUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes scaleUp {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #34d399, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 35px;
      font-size: 1.05rem;
    }
    .security-notice {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 16px;
      padding: 18px;
      font-size: 0.9rem;
      color: var(--text-muted);
      text-align: left;
      margin-bottom: 35px;
      line-height: 1.5;
    }
    .security-title {
      font-weight: 600;
      color: var(--text-color);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-group {
      display: flex;
      justify-content: center;
      gap: 15px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      border: none;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 8px 20px var(--primary-glow);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(59, 130, 246, 0.45);
      background: #2563eb;
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-color);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <div class="success-icon">✓</div>
    <h1>安全登出成功</h1>
    <p>您已成功退出登录，当前的网关本地会话凭证已被安全清除销毁。</p>
    
    <div class="security-notice">
      <div class="security-title">🛡️ 零信任安全提示:</div>
      由于 OAuth2 协议特性，如果您的畅捷通开放平台云端会话尚未过期，再次进入主目录可能会直接触发静默单点登录授权。若需要完全切换账号，请在重新登录前清除开放平台官网的会话 Cookie。
    </div>

    <div class="btn-group">
      <a href="http://127.0.0.1:18080/" class="btn btn-primary">重新登录系统</a>
      <a href="javascript:window.close();" class="btn btn-secondary">关闭当前窗口</a>
    </div>
  </div>
</body>
</html>
