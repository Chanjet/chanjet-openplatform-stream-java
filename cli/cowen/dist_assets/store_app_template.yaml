# ============================================================================
# Chanjet Stream Gateway Config Template (Profile: default)
# ============================================================================

# ----------------------------------------------------------------------------
# 1. 基础应用凭据 (Base Application Credentials)
# ----------------------------------------------------------------------------

# [必填] 开放平台分配给您的应用的 AppKey。用于标识唯一的应用身份。
app_key: "mock_app_key"

# [必填] 应用的工作模式，决定了鉴权与网关同步机制。
# 可选值: 
#   - store-app: 商店/应用市场应用 (ISV 旁挂/侧车模式)
#   - self-built: 自建企业内部应用 (直接使用自建应用证书与密钥)
#   - oauth2: 标准三方 OAuth2 授权码应用模式
app_mode: "store-app"

# [可选/按需必填] 开放平台分配给您应用的应用密钥 (AppSecret)。
# 用于换取 Access Token 以及对报文执行签名。在 store-app (商店应用) 与 self-built (自建应用) 模式下必填。
# 出于安全考虑，推荐将此字段注释，并通过外部环境变量 (COWEN_APP_SECRET) 或 K8s Secret 传入。
# app_secret: "<YOUR_APP_SECRET>"

# [可选/按需必填] 消息体对称加解密密钥 (AES Encrypt Key)。
# 用于对接收到的数据流 (Stream) 报文或 Webhook 推送包进行自动就地解密。在 store-app (商店应用) 模式下，若开启了开放平台数据流推送，则该参数必填以解密报文。
# 出于安全考虑，推荐通过外部环境变量 (COWEN_ENCRYPT_KEY) 或 K8s Secret 传入。
# encrypt_key: "<YOUR_ENCRYPT_KEY>"

# [可选/按需必填] 自建应用的企业证书内容 (通常为 PEM 格式 of 证书公钥)。
# 仅在 app_mode 为 self-built (自建应用) 且选用非对称证书签名方式时必填。
# certificate: "<YOUR_CERTIFICATE>"


# ----------------------------------------------------------------------------
# 2. ISV 业务系统与代理端口 (ISV Downstream & Egress Proxy Config)
# ----------------------------------------------------------------------------

# [可选] 订阅数据流推送或授权变更时，接收来自网关转发的目标业务系统 URL 路径。
# 默认值: 无 (若不配置，接收到的数据流事件将仅在本地记录警告并丢弃)
# webhook_target: "http://127.0.0.1:5000/callback"

# [可选] 本地自动鉴权出口代理 (Egress Proxy) 监听的本地端口。
# 您的 ISV 业务系统可通过将 HTTP 代理设置为此端口，实现无需手动处理 Token 与加签的无感 OpenAPI 调用。
# 默认值: 0 (不启动出口代理)
# proxy_port: 8080

# [可选] 是否启用本地自动鉴权出口代理功能。
# 设为 true 后，Egress 进程会绑定 proxy_port 端口提供正向代理服务。
# 默认值: true
# proxy_enabled: true

# [可选] 排他式连接选项。
# 若设为 true，当同一个应用在其他实例上线时，将自动断开并接管当前连接，常用于本地开发调试环境。
# 默认值: false
# exclusive: false


# ----------------------------------------------------------------------------
# 3. Inbound 身份感知网关 (v0.5.0 Inbound Gateway Config)
# ----------------------------------------------------------------------------
# [可选] Inbound 身份感知网关模块配置。若配置，将开启侧车网关反向代理模式，对入站 HTTP 请求进行拦截鉴权。
# 默认值: 不开启 (默认仅启用 Egress 出口代理与 Webhook 推送)
# gateway:
#   # [可选] 网关对内和对外提供流量接收的绑定监听网络地址。
#   # 默认值: "127.0.0.1:8080"
#   bind_address: "0.0.0.0:8090"
# 
# 
#   # [可选] 授权同步钩子 (Sync Hook) 接口。
#   # 当网关通过 code 换票成功建立用户 Session 后，会向此 URL 发送同步请求，用于建立 ISV 侧的局部 Session。
#   # 默认值: 无
#   # auth_sync_hook: "http://127.0.0.1:5000/callback"
# 
#   # [可选] 授权路由拦截策略设置。
#   # auth_routing:
#   #   # 鉴权路由模式。
#   #   # 可选值:
#   #   #   - STRICT: 严格保护模式。除 bypass_rules 声明的路径外，所有经过网关的请求必须携带合法 Session/Cookie。
#   #   #   - PERMISSIVE: 放行模式。放行所有请求，但会对携带合法凭证的请求在 Header 中自动注入身份信息。
#   #   # 默认值: STRICT
#   #   mode: "STRICT"
#   # 
#   #   # 【白名单与强制校验名单规则说明】：
#   #   # - bypass_rules：免鉴权白名单。仅在 STRICT (严格保护) 模式下生效。
#   #   #   匹配此白名单的请求会被直接放行，不进行 Session 与登录校验；未匹配的请求则默认进行强制鉴权。
#   #   # - require_rules：强制校验名单。仅在 PERMISSIVE (放行/宽松) 模式下生效。
#   #   #   默认放行所有请求，但只要请求匹配了此名单，便会被强制拦截并执行鉴权；未匹配的请求直接放行。
#   #   # 注：在任一模式下，另一个名单都会被自动忽略。支持 Glob 匹配规则（如 /static/** 或具体路径）。
#   #   # 默认值: 空列表 []
#   #   # bypass_rules:
#   #   #   - "/v1/mock/ping"
#   #   #   - "/static/**"
#   #   # 
#   #   # [可选] 强制要求身份校验的路径列表。
#   #   # 默认值: 空列表 []
#   #   # require_rules:
#   #   #   - "/v1/api/**"
# 
#   # [可选] 多租户/多上游声明式路由规则映射表。
#   # 【优先级与覆盖规则说明】：
#   # 网关在进行入站路由匹配时，遵循【自上而下、先匹配先赢 (First-Match-Wins)】的顺序原则。
#   # 越具体、范围越窄的路由路径（如 /open-api/**）必须放置在最上面；
#   # 全局兜底匹配规则（如 /**）必须放置在路由表的最底端，否则会覆盖并屏蔽在其下方声明的所有其他规则。
#   # 默认值: 空列表 []
#   # routes:
#   #   # 旁挂直连开放平台 OpenAPI 的路由匹配规则。
#   #   # 特殊的 "openapi" 关键字，表示由网关在本地进行签名洗白，并直接一跳转发至畅捷通公网 OpenAPI 平台。
#   #   - path: "/open-api/**"
#   #     upstream: "openapi"
#   #     strip_prefix: "/open-api"
#   #   - path: "/openapi/**"
#   #     upstream: "openapi"
#   #     strip_prefix: "/openapi"
#   #   # 全局默认兜底路由示例（若无其他路由匹配，将请求默认转发给本地业务主服务，如端口 13000）。
#   #   - path: "/**"
#   #     upstream: "http://127.0.0.1:13000"


# ----------------------------------------------------------------------------
# 4. 全局基础设施配置 (Global Infrastructure Settings - 保存至 app.yaml)
# ----------------------------------------------------------------------------
# [可选] 存储引擎与缓存配置。
# storage:
#   # [可选] 存储引擎类型。
#   # 可选值:
#   #   - sqlite: 本地单机 SQLite 存储 (默认)
#   #   - mysql: 关系型 MySQL 数据库 (支持分布式)
#   #   - postgres: 关系型 PostgreSQL 数据库 (支持分布式)
#   #   - innerdb: 内置内存数据库 (重启失效，常用于单机临时测试)
#   #   - redis: 仅用作 Redis 单机存储 (不推荐作为主存储)
#   #   - mssql: Microsoft SQL Server 数据库
#   # 默认值: sqlite
#   type: "mysql"
# 
#   # [可选/按需必填] 存储引擎连接 URL。需与上面配置的 type 相匹配。若 type 选用 mysql / postgres / mssql 等外部关系型数据库，则此项必填。
#   # 默认值: 无 (SQLite 默认保存在当前路径文件下)
#   db_url: "mysql://user:pass@mysql-master:3306/cowen_db"
# 
#   # [可选] 缓存服务类型，用以提升多实例下的会话状态与 Token 校验性能。
#   # 可选值: none (无缓存), redis (Redis 分布式缓存)
#   # 默认值: none
#   # cache: "redis"
# 
#   # [可选/按需必填] 缓存服务连接 URL。若 cache 选用 redis，则此项必填。
#   # 默认值: 无
#   # cache_url: "redis://redis-service:6379"

# [可选] 系统日志设置。
# log:
#   # [可选] 日志级别。
#   # 可选值: trace, debug, info, warn, error
#   # 默认值: info
#   level: "info"
# 
#   # [可选] 日志切分滚动策略。
#   # 可选值: daily (每日切分), hourly (每小时切分), size (按大小切分)
#   # 默认值: daily
#   # rotation: "daily"
# 
#   # [可选] 单个日志文件的最大大小限制 (单位: MB)。超过该值会自动滚存新文件。
#   # 默认值: 100
#   # max_size_mb: 100
# 
#   # [可选] 保留的历史日志文件最大数量，超出的旧日志会被自动清理。
#   # 默认值: 7
#   # max_files: 7
