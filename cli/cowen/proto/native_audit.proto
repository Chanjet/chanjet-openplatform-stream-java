syntax = "proto3";
package cowen.daemon.native.audit.v1;

// NativeAuditService 提供系统审计日志的读取与追踪服务。
// 帮助应用开发者在控制台实时监控、分析和审计与开放平台交互过程中的关键安全事件和调用足迹。
service NativeAuditService {
    // 获取指定数量的最新审计日志条目。
    rpc TailAudit (TailAuditRequest) returns (TailAuditResponse);
}

// 请求获取最新审计日志的参数结构
message TailAuditRequest {
    // 环境配置文件 Profile 的标识（如 "default"）。必填。
    string profile = 1;

    // 需要读取的最新审计日志的最大行数。必填。
    uint32 lines = 2;
}

// 审计日志查询响应结构
message TailAuditResponse {
    // 审计日志的文本内容（多行文本格式）。
    string content = 1;

    // 如果日志读取或定位失败，包含详细的错误描述。可选。
    optional string error_message = 2;
}
