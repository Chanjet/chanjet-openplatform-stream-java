syntax = "proto3";
package cowen.daemon.public.system.v1;

// PublicSystemService 提供插件系统公开调用的基础握手服务。
// 用于插件在被守护进程拉起时，完成初始注册、版本匹配及所需和支持的能力（Capabilities）协商。
service PublicSystemService {
    // 与外部插件进行初始注册和握手。协商双方所需及支持的功能特性，建立信任通信上下文。
    rpc PluginHandshake (PluginHandshakeRequest) returns (PluginHandshakeResponse);
}

// 插件注册与握手请求参数
message PluginHandshakeRequest {
    // 插件的唯一标识名称（例如 "cowen-wasm-auth-selfbuilt"）。必填。
    string plugin_name = 1;

    // 插件的版本号（语义化版本，如 "1.0.0"）。必填。
    string plugin_version = 2;

    // 插件运行所需的系统能力（Capabilities）清单。
    // 包含能力名称以及所需的最低版本要求。
    map<string, string> required_capabilities = 3;
}

// 插件注册与握手响应结果
message PluginHandshakeResponse {
    // 握手及能力协商是否成功。
    bool success = 1;

    // 握手结果或错误状态的简要描述。
    string message = 2;

    // 守护进程在本次握手中同意为插件开放和提供支持的能力清单及具体版本。
    map<string, string> supported_capabilities = 3;
}
