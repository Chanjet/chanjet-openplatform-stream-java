syntax = "proto3";
package cowen.daemon.native.system.v1;

// NativeSystemService 提供系统级状态查询、诊断检查、重置和双向进程间隧道通道。
// 该服务可用于了解底层存储引擎的健康度、执行整体重置、进行系统体检以及为外部插件建立输入输出通道隧道。
service NativeSystemService {
    // 获取底层数据库和保险箱（Vault）存储的当前连接和锁定状态。
    rpc StoreStatus (StoreStatusRequest) returns (StoreStatusResponse);

    // 获取整个系统的资源使用、网络连通性和各模块的综合状态信息。
    rpc SystemStatus (SystemStatusRequest) returns (SystemStatusResponse);

    // 重置系统状态。支持清理 Profile 配置、归档死信队列、重置本地数据库等。支持干跑模式校验。
    rpc SystemReset (SystemResetRequest) returns (SystemResetResponse);

    // 执行一键体检诊断，检查本地网络、文件权限、开放平台可达性以及证书时效性。
    rpc Doctor (DoctorRequest) returns (DoctorResponse);

    // 迁移存储后端。将所有已保存的配置和凭据状态迁移至指定的新后端。
    // 示例中的敏感数据值必须使用占位符展示，例如：target_url = "mysql://<USER>:<PASSWORD>@localhost:3306/db"
    rpc StoreMigrate (StoreMigrateRequest) returns (StoreMigrateResponse);

    // 建立一个与指定系统插件进行双向数据流交互的管道（通过 stdio 流转发实现通信）。
    // 主要用于在无直接通信媒介时建立跨进程双向隧道。
    rpc TunnelPlugin (stream TunnelPluginRequest) returns (stream TunnelPluginResponse);
}

// 查询存储引擎状态的请求参数
message StoreStatusRequest {}

// 查询存储引擎状态的响应结果
message StoreStatusResponse {
    // 包含数据库文件大小、读写锁定信息和连接池状态的 JSON 格式字符串。
    string json = 1;

    // 如果获取状态失败，包含的详细系统报错描述。可选。
    optional string error_message = 2;
}

// 查询系统综合状态的请求参数
message SystemStatusRequest {
    // 环境配置文件 Profile 的标识。必填。
    string profile = 1;

    // 是否收集所有详细运行时指标。若为 true，将包含内存使用、CPU 负载以及缓存命中率。
    bool all = 2;
}

// 查询系统综合状态的响应结果
message SystemStatusResponse {
    // 包含守护进程运行时系统状态和基础指标的 JSON 格式字符串。
    string json = 1;

    // 如果获取系统状态失败，包含的详细错误信息。可选。
    optional string error_message = 2;
}

// 系统重置操作的请求参数
message SystemResetRequest {
    // 待重置的特定 Profile 名称。如果不传，则表示对系统整体配置和全局状态进行重置。可选。
    optional string profile = 1;

    // 是否开启干跑（只检测和预测，不实际执行修改行为）。默认为 false。
    bool dry_run = 2;
}

// 系统重置操作的响应结果
message SystemResetResponse {
    // 重置操作或预检检测是否成功。
    bool success = 1;

    // 重置动作的过程日志和反馈结果文本。
    string message = 2;
}

// 诊断自检（Doctor）的请求参数
message DoctorRequest {
    // 待体检的 Profile 环境标识。必填。
    string profile = 1;
}

// 诊断自检（Doctor）的响应结果
message DoctorResponse {
    // 诊断体检报告内容（通常为多行 Markdown 文本格式）。
    string report = 1;

    // 如果运行诊断失败，包含的系统报错描述。可选。
    optional string error_message = 2;
}

// 插件数据流隧道请求结构（客户端发送给服务端）
message TunnelPluginRequest {
    // 在数据流的“第一个 Message”中必须包含目标插件名称，以引导服务端寻址。后续的 Message 中可以为空。可选。
    optional string plugin_name = 1;

    // 传入插件标准输入 (stdin) 的数据二进制负载。可选。
    optional bytes stdin_payload = 2;

    // 启动插件进程时需要携带的命令行参数列表。可选。
    repeated string args = 3;

    // 启动插件进程时需要覆盖或注入的环境变量键值对。可选。
    map<string, string> envs = 4;
}

// 插件数据流隧道响应结构（服务端推送回客户端）
message TunnelPluginResponse {
    // 插件标准输出 (stdout) 的数据二进制负载。可选。
    optional bytes stdout_payload = 1;

    // 插件标准错误 (stderr) 的数据二进制负载。可选。
    optional bytes stderr_payload = 2;

    // 管道流式传输中的异常错误信息描述。可选。
    optional string error_message = 3;
}

// 存储迁移请求参数
message StoreMigrateRequest {
    // 目标存储后端的连接 URL
    string target_url = 1;
    // 迁移模式，可选值："clone"、"move"
    string mode = 2;
}

// 存储迁移响应结果
message StoreMigrateResponse {
    // 迁移是否成功
    bool success = 1;
    // 迁移结果提示信息
    string message = 2;
}
