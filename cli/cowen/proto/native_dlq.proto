syntax = "proto3";
package cowen.daemon.native.dlq.v1;

// NativeDlqService 提供了死信队列（Dead Letter Queue, DLQ）的管理与运维服务。
// 当消息连接器拉取开放平台消息失败并耗尽重试次数后，消息会被归入死信队列。该服务用于查看、重试和清理死信。
service NativeDlqService {
    // 分页查询指定 Profile 关联死信队列中的死信消息列表。
    rpc DlqList (DlqListRequest) returns (DlqListResponse);

    // 查看单条死信消息的详细元数据和故障上下文（如失败堆栈、消息原文等）。
    rpc DlqView (DlqViewRequest) returns (DlqViewResponse);

    // 重新投递/重试单条指定的死信消息，尝试让连接器重新消费。
    rpc DlqRetry (DlqRetryRequest) returns (DlqRetryResponse);

    // 清空指定 Profile 关联死信队列中的所有死信数据。
    rpc DlqPurge (DlqPurgeRequest) returns (DlqPurgeResponse);
}

// 查询死信列表的请求参数
message DlqListRequest {
    // 环境配置文件 Profile 的标识。必填。
    string profile = 1;

    // 分页查询的当前页码，从 1 开始。必填。
    uint32 page = 2;

    // 分页查询的单页大小限制。必填。
    uint32 page_size = 3;
}

// 查询死信列表的响应结果
message DlqListResponse {
    // 包含死信记录列表及分页统计信息的 JSON 格式字符串。
    string json = 1;

    // 如果查询出错，包含的系统报错描述。可选。
    optional string error_message = 2;
}

// 查看单条死信消息详情的请求参数
message DlqViewRequest {
    // 环境配置文件 Profile 的标识。必填。
    string profile = 1;

    // 死信记录的唯一 ID 标识。必填。
    string id = 2;
}

// 查看单条死信消息详情的响应结果
message DlqViewResponse {
    // 包含死信详细负载、重试历史和最终错误上下文的 JSON 格式字符串。
    string json = 1;

    // 如果获取详情失败，包含的详细错误描述。可选。
    optional string error_message = 2;
}

// 重试单条死信消息的请求参数
message DlqRetryRequest {
    // 环境配置文件 Profile 的标识。必填。
    string profile = 1;

    // 待重投的死信记录唯一 ID。必填。
    string id = 2;
}

// 重试单条死信消息的响应结果
message DlqRetryResponse {
    // 重试投递任务是否成功触发。
    bool success = 1;

    // 处理状态结果描述信息。
    string message = 2;

    // 如果重试命令执行失败，包含的详细错误原因。可选。
    optional string error_message = 3;
}

// 清空死信队列的请求参数
message DlqPurgeRequest {
    // 环境配置文件 Profile 的标识。必填。
    string profile = 1;
}

// 清空死信队列的响应结果
message DlqPurgeResponse {
    // 清空操作是否成功。
    bool success = 1;

    // 清理任务的处理反馈信息。
    string message = 2;

    // 如果清除失败，包含的详细报错信息。可选。
    optional string error_message = 3;
}
